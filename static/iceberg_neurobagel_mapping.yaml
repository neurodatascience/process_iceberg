# ICEBERG Cohort — Neurobagel Variable Mapping
# Source: 2023_04_05_Gel_Iceberg_patient1.xlsx (Dictionnaire sheet)
# column_index values are 0-based and sheet-specific.
# All sheets share num_sujet + redcap_event_name as the join key.

metadata:
  source_file: "2023_04_05_Gel_Iceberg_patient1.xlsx"
  study: "ICEBERG cohort (Parkinson's disease and at-risk groups, longitudinal)"
  note: >
    Neurobagel supports nb:ParticipantID, nb:SessionID, nb:Age, nb:Sex,
    nb:Diagnosis, and nb:Assessment. Imaging modality availability flags
    are included separately for Neurobagel imaging-table construction
    (not annotatable via the phenotypic annotation tool).

join_keys:
  - column_name: num_sujet
    sheet: Général   # column 0 in every data sheet
    column_index: 0
    description: "Unique participant number — present as column 0 in every data sheet"
  - column_name: redcap_event_name
    sheet: Général   # column 1 in every data sheet
    column_index: 1
    description: "REDCap visit/event name — present as column 1 in every data sheet"

# ─────────────────────────────────────────────────────────────────────────────
# NEUROBAGEL PHENOTYPIC VARIABLES
# ─────────────────────────────────────────────────────────────────────────────
neurobagel_variables:

  # ── Identifiers ─────────────────────────────────────────────────────────────
  participant_id:
    neurobagel_term: "nb:ParticipantID"
    variable_type: Identifier
    columns:
      - sheet: Général
        column_name: num_sujet
        column_index: 0
        description: "Unique participant number"
        missing_values: []

  session_id:
    neurobagel_term: "nb:SessionID"
    variable_type: Identifier
    columns:
      - sheet: Général
        column_name: redcap_event_name
        column_index: 1
        description: "REDCap event identifier encoding study visit"
        unique_values:
          - v0_arm_1          # Visit 0 (baseline)
          - v1_arm_1          # Visit 1 (~1 year)
          - v2_arm_1          # Visit 2 (~2 years)
          - v3_arm_1          # Visit 3 (~3 years)
          - v4_arm_1          # Visit 4 (~4 years)
          - m6_optionnel__6_mo_arm_1  # Optional 6-month visit
          - gen_arm_1          # General/administrative
          - covid19_arm_1      # COVID-19 follow-up
        missing_values: []

  # ── Demographics ────────────────────────────────────────────────────────────
  sex:
    neurobagel_term: "nb:Sex"
    variable_type: Categorical
    neurobagel_level_terms:
      "1": "snomed:248153007"   # Male
      "2": "snomed:248152002"   # Female
    columns:
      - sheet: Général
        column_name: sexe
        column_index: 5
        description: "Biological sex of the participant"
        levels:
          "1": "Masculin (Male)"
          "2": "Feminin (Female)"
        missing_values: ["0", "", NaN]

  diagnosis:
    neurobagel_term: "nb:Diagnosis"
    variable_type: Categorical
    neurobagel_level_terms:
      "1": "ncit:C94342"         # Healthy Control (Temoin)
      "2": "TBD"                 # iRBD — needs SNOMED term lookup
      "3": "TBD"                 # At-risk relative (Apparente) — needs term lookup
      "4": "snomed:49049000"     # Idiopathic Parkinson's Disease
      "5": "snomed:49049000"     # PD with genetic mutation (use same PD term; mutation can be sub-typed)
    columns:
      - sheet: Général
        column_name: groupe
        column_index: 36
        description: "Participant's diagnostic group at the current study visit"
        levels:
          "1": "Temoin (Healthy Control)"
          "2": "iRBD (Isolated REM Sleep Behavior Disorder)"
          "3": "Apparente (At-risk first-degree relative of PD patient)"
          "4": "Parkinson idiopathique (Idiopathic Parkinson's Disease)"
          "5": "Parkinson avec mutation (Parkinson's Disease with identified genetic mutation)"
        missing_values: ["0", "", NaN]
      - sheet: Général
        column_name: statut_inclusion
        column_index: 8
        description: "Participant's diagnostic status at the time of cohort inclusion (may differ from later 'groupe' if classification changed)"
        levels:
          "1": "Temoin (Healthy Control)"
          "2": "iRBD (Isolated REM Sleep Behavior Disorder)"
          "3": "Apparente (At-risk first-degree relative of PD patient)"
          "4": "Parkinson idiopathique (Idiopathic Parkinson's Disease)"
          "5": "Parkinson avec mutation (Parkinson's Disease with identified genetic mutation)"
        missing_values: ["0", "", NaN]

  age:
    neurobagel_term: "nb:Age"
    variable_type: Continuous
    note: >
      No precomputed age column exists in the dataset. Age at visit must be
      calculated downstream as:
        age = (visit_year + visit_month/12) - (birth_year + birth_month/12)
      where date_visite is stored as an Excel serial number (origin 1899-12-30).
    columns:
      - sheet: Général
        column_name: ddn_m
        column_index: 6
        description: "Birth month (integer, 1–12)"
        range: [1, 12]
        missing_values: ["0", "", NaN]
      - sheet: Général
        column_name: ddn_a
        column_index: 7
        description: "Birth year (4-digit integer, e.g. 1957)"
        range: [1920, 2005]
        missing_values: ["0", "", NaN]
      - sheet: Général
        column_name: date_visite
        column_index: 2
        description: "Visit date stored as Excel serial number (origin 1899-12-30); convert with pd.to_datetime(origin='1899-12-30', unit='D')"
        missing_values: ["", NaN]

  # ── Assessment tools ─────────────────────────────────────────────────────────
  assessments:

    # ── MoCA ──────────────────────────────────────────────────────────────────
    moca:
      assessment_name: "Montreal Cognitive Assessment (MoCA)"
      neurobagel_term: "nb:Assessment"
      assessment_term_url: "snomed:859351000000102"
      sheet: Neuropsy
      admin_flags:
        - column_name: examen_realise_moca
          column_index: 47
          description: "MoCA administered at this visit (1=Yes, 0=No)"
      columns:
        - {column_name: trail_moca,         column_index:  49, description: "MoCA trail-making alternation (visuospatial/executive)", range: [0, 1]}
        - {column_name: cube_moca,          column_index:  50, description: "MoCA visuoconstructional skill — cube copy", range: [0, 1]}
        - {column_name: clock_moca,         column_index:  51, description: "MoCA visuoconstructional skill — clock drawing (contour, numbers, hands)", range: [0, 3]}
        - {column_name: naming_moca,        column_index:  52, description: "MoCA confrontation naming — 3 animal drawings", range: [0, 3]}
        - {column_name: digits_moca,        column_index:  53, description: "MoCA attention — forward and backward digit span", range: [0, 2]}
        - {column_name: letters_moca,       column_index:  54, description: "MoCA attention — sustained attention letter-tapping", range: [0, 1]}
        - {column_name: substraction_moca,  column_index:  55, description: "MoCA attention — serial 7 subtraction (3 points)", range: [0, 3]}
        - {column_name: repeat_moca,        column_index:  56, description: "MoCA language — sentence repetition (2 sentences)", range: [0, 2]}
        - {column_name: fluency_moca,       column_index:  57, description: "MoCA language — letter fluency (F-words in 1 minute, ≥11 = pass)", range: [0, 1]}
        - {column_name: abstraction_moca,   column_index:  58, description: "MoCA abstraction — verbal similarities (2 pairs)", range: [0, 2]}
        - {column_name: recall_memory_moca, column_index:  59, description: "MoCA delayed recall — 5-word free recall", range: [0, 5]}
        - {column_name: orientation_moca,   column_index:  60, description: "MoCA orientation — date, month, year, day, place, city", range: [0, 6]}
        - {column_name: scolarite_moca,     column_index:  61, description: "MoCA education correction — add 1 point if ≤12 years of schooling", range: [0, 1]}
        - {column_name: total_moca,         column_index:  62, description: "MoCA total score (calculated sum)", range: [0, 30]}
        - {column_name: f_moca_fluences,    column_index: 246, description: "Raw count of F-words produced in MoCA fluency task (used to derive fluency_moca)", range: [0, null]}
      missing_values: ["", NaN]

    # ── MMSE ──────────────────────────────────────────────────────────────────
    mmse:
      assessment_name: "Mini-Mental State Examination (MMSE)"
      neurobagel_term: "nb:Assessment"
      assessment_term_url: "snomed:273617009"  # verify: SNOMED for MMSE
      sheet: Neuropsy
      admin_flags:
        - column_name: examen_realise_mmse
          column_index: 8
          description: "MMSE administered at this visit (1=Yes, 0=No)"
      columns:
        # Orientation items (mms1–mms10)
        - {column_name: mms1,  column_index: 10, description: "MMSE orientation item 1 — current year",     range: [0, 1]}
        - {column_name: mms2,  column_index: 11, description: "MMSE orientation item 2 — current season",   range: [0, 1]}
        - {column_name: mms3,  column_index: 12, description: "MMSE orientation item 3 — current month",    range: [0, 1]}
        - {column_name: mms4,  column_index: 13, description: "MMSE orientation item 4 — today's date",     range: [0, 1]}
        - {column_name: mms5,  column_index: 14, description: "MMSE orientation item 5 — day of week",      range: [0, 1]}
        - {column_name: mms6,  column_index: 15, description: "MMSE orientation item 6 — country",          range: [0, 1]}
        - {column_name: mms7,  column_index: 16, description: "MMSE orientation item 7 — department/region",range: [0, 1]}
        - {column_name: mms8,  column_index: 17, description: "MMSE orientation item 8 — city/town",        range: [0, 1]}
        - {column_name: mms9,  column_index: 18, description: "MMSE orientation item 9 — place/building",   range: [0, 1]}
        - {column_name: mms10, column_index: 19, description: "MMSE orientation item 10 — floor",           range: [0, 1]}
        # Registration items (mms11–mms13)
        - {column_name: mms11, column_index: 21, description: "MMSE registration — word 1", range: [0, 1]}
        - {column_name: mms12, column_index: 22, description: "MMSE registration — word 2", range: [0, 1]}
        - {column_name: mms13, column_index: 23, description: "MMSE registration — word 3", range: [0, 1]}
        # Attention / calculation (mms14–mms18: serial 7s)
        - {column_name: mms14, column_index: 25, description: "MMSE attention/calculation — serial 7, step 1 (100-7=93)", range: [0, 1]}
        - {column_name: mms15, column_index: 26, description: "MMSE attention/calculation — serial 7, step 2 (93-7=86)",  range: [0, 1]}
        - {column_name: mms16, column_index: 27, description: "MMSE attention/calculation — serial 7, step 3 (86-7=79)",  range: [0, 1]}
        - {column_name: mms17, column_index: 28, description: "MMSE attention/calculation — serial 7, step 4 (79-7=72)",  range: [0, 1]}
        - {column_name: mms18, column_index: 29, description: "MMSE attention/calculation — serial 7, step 5 (72-7=65)",  range: [0, 1]}
        # Recall items (mms19–mms21)
        - {column_name: mms19, column_index: 31, description: "MMSE recall — word 1", range: [0, 1]}
        - {column_name: mms20, column_index: 32, description: "MMSE recall — word 2", range: [0, 1]}
        - {column_name: mms21, column_index: 33, description: "MMSE recall — word 3", range: [0, 1]}
        # Language items (mms22–mms30)
        - {column_name: mms22, column_index: 35, description: "MMSE language — naming: pencil",              range: [0, 1]}
        - {column_name: mms23, column_index: 36, description: "MMSE language — naming: watch",               range: [0, 1]}
        - {column_name: mms24, column_index: 37, description: "MMSE language — repetition ('No ifs, ands, or buts')", range: [0, 1]}
        - {column_name: mms25, column_index: 38, description: "MMSE language — 3-step command (total correct steps out of 3)", range: [0, 3]}
        - {column_name: mms26, column_index: 39, description: "MMSE language — reading and following a written command", range: [0, 1]}
        - {column_name: mms27, column_index: 40, description: "MMSE language — writing a spontaneous sentence", range: [0, 1]}
        - {column_name: mms28, column_index: 41, description: "MMSE language — copying two overlapping pentagons", range: [0, 1]}
        - {column_name: mms29, column_index: 42, description: "MMSE language — additional item 29", range: [0, 1]}
        - {column_name: mms30, column_index: 44, description: "MMSE language — additional item 30", range: [0, 1]}
        # Calculated subscale scores
        - {column_name: calc_mms_orient,  column_index: 20, description: "MMSE orientation subscale total (items 1–10)",          range: [0, 10]}
        - {column_name: calc_mms_apprent, column_index: 24, description: "MMSE registration subscale total (items 11–13)",        range: [0,  3]}
        - {column_name: calc_mms_attent,  column_index: 30, description: "MMSE attention/calculation subscale total (items 14–18)",range: [0,  5]}
        - {column_name: calc_mms_rapp,    column_index: 34, description: "MMSE recall subscale total (items 19–21)",               range: [0,  3]}
        - {column_name: calc_mms_lang,    column_index: 43, description: "MMSE language subscale total (items 22–30)",             range: [0,  9]}
        - {column_name: calc_mms_tot,     column_index: 45, description: "MMSE total score (calculated sum of all subscales)",     range: [0, 30]}
      missing_values: ["", NaN]

    # ── MDS-UPDRS ─────────────────────────────────────────────────────────────
    mds_updrs:
      assessment_name: "Movement Disorder Society Unified Parkinson's Disease Rating Scale (MDS-UPDRS)"
      neurobagel_term: "nb:Assessment"
      assessment_term_url: "snomed:342061000000106"
      sheet: Motrice
      admin_flags:
        - column_name: examen_realise_mds_3_off
          column_index: 42
          description: "MDS-UPDRS Part 3 examination performed at this visit (1=Yes, 0=No)"
      columns:
        # ── Part 1: Non-motor experiences of daily living ──
        - {column_name: mds_1_1,  column_index: 176, description: "MDS-UPDRS 1.1  — cognitive impairment", range: [0, 4]}
        - {column_name: mds_1_2,  column_index: 177, description: "MDS-UPDRS 1.2  — hallucinations and psychosis", range: [0, 4]}
        - {column_name: mds_1_3,  column_index: 178, description: "MDS-UPDRS 1.3  — depressed mood", range: [0, 4]}
        - {column_name: mds_1_4,  column_index: 179, description: "MDS-UPDRS 1.4  — anxious mood", range: [0, 4]}
        - {column_name: mds_1_5,  column_index: 180, description: "MDS-UPDRS 1.5  — apathy", range: [0, 4]}
        - {column_name: mds_1_6,  column_index: 181, description: "MDS-UPDRS 1.6  — dopamine dysregulation syndrome features", range: [0, 4]}
        - {column_name: mds_1_7,  column_index: 182, description: "MDS-UPDRS 1.7  — sleep problems", range: [0, 4]}
        - {column_name: mds_1_8,  column_index: 183, description: "MDS-UPDRS 1.8  — daytime sleepiness", range: [0, 4]}
        - {column_name: mds_1_9,  column_index: 184, description: "MDS-UPDRS 1.9  — pain and other sensations", range: [0, 4]}
        - {column_name: mds_1_10, column_index: 185, description: "MDS-UPDRS 1.10 — urinary problems", range: [0, 4]}
        - {column_name: mds_1_11, column_index: 186, description: "MDS-UPDRS 1.11 — constipation problems", range: [0, 4]}
        - {column_name: mds_1_12, column_index: 187, description: "MDS-UPDRS 1.12 — light-headedness on standing", range: [0, 4]}
        - {column_name: mds_1_13, column_index: 188, description: "MDS-UPDRS 1.13 — fatigue", range: [0, 4]}
        # ── Part 2: Motor aspects of experiences of daily living ──
        - {column_name: mds_2_1,  column_index: 190, description: "MDS-UPDRS 2.1  — speech", range: [0, 4]}
        - {column_name: mds_2_2,  column_index: 191, description: "MDS-UPDRS 2.2  — saliva and drooling", range: [0, 4]}
        - {column_name: mds_2_3,  column_index: 192, description: "MDS-UPDRS 2.3  — chewing and swallowing", range: [0, 4]}
        - {column_name: mds_2_4,  column_index: 193, description: "MDS-UPDRS 2.4  — eating tasks", range: [0, 4]}
        - {column_name: mds_2_5,  column_index: 194, description: "MDS-UPDRS 2.5  — dressing", range: [0, 4]}
        - {column_name: mds_2_6,  column_index: 195, description: "MDS-UPDRS 2.6  — hygiene", range: [0, 4]}
        - {column_name: mds_2_7,  column_index: 196, description: "MDS-UPDRS 2.7  — handwriting", range: [0, 4]}
        - {column_name: mds_2_8,  column_index: 197, description: "MDS-UPDRS 2.8  — doing hobbies and other activities", range: [0, 4]}
        - {column_name: mds_2_9,  column_index: 198, description: "MDS-UPDRS 2.9  — turning in bed", range: [0, 4]}
        - {column_name: mds_2_10, column_index: 199, description: "MDS-UPDRS 2.10 — tremor", range: [0, 4]}
        - {column_name: mds_2_11, column_index: 200, description: "MDS-UPDRS 2.11 — getting out of bed, car, or deep chair", range: [0, 4]}
        - {column_name: mds_2_12, column_index: 201, description: "MDS-UPDRS 2.12 — walking and balance", range: [0, 4]}
        - {column_name: mds_2_13, column_index: 202, description: "MDS-UPDRS 2.13 — freezing", range: [0, 4]}
        # ── Part 3: Motor examination — OFF state ──
        - {column_name: mds_3_1_off,    column_index:  52, description: "MDS-UPDRS 3.1  OFF — speech", range: [0, 4]}
        - {column_name: mds_3_2_off,    column_index:  53, description: "MDS-UPDRS 3.2  OFF — facial expression", range: [0, 4]}
        - {column_name: mds_3_3_1_off,  column_index:  54, description: "MDS-UPDRS 3.3a OFF — rigidity: neck", range: [0, 4]}
        - {column_name: mds_3_3_2_off,  column_index:  55, description: "MDS-UPDRS 3.3b OFF — rigidity: right upper extremity", range: [0, 4]}
        - {column_name: mds_3_3_3_off,  column_index:  56, description: "MDS-UPDRS 3.3c OFF — rigidity: left upper extremity", range: [0, 4]}
        - {column_name: mds_3_3_4_off,  column_index:  57, description: "MDS-UPDRS 3.3d OFF — rigidity: right lower extremity", range: [0, 4]}
        - {column_name: mds_3_3_5_off,  column_index:  58, description: "MDS-UPDRS 3.3e OFF — rigidity: left lower extremity", range: [0, 4]}
        - {column_name: mds_3_4_1_off,  column_index:  59, description: "MDS-UPDRS 3.4a OFF — finger tapping: right hand", range: [0, 4]}
        - {column_name: mds_3_4_2_off,  column_index:  60, description: "MDS-UPDRS 3.4b OFF — finger tapping: left hand", range: [0, 4]}
        - {column_name: mds_3_5_1_off,  column_index:  61, description: "MDS-UPDRS 3.5a OFF — hand movements: right", range: [0, 4]}
        - {column_name: mds_3_5_2_off,  column_index:  62, description: "MDS-UPDRS 3.5b OFF — hand movements: left", range: [0, 4]}
        - {column_name: mds_3_6_1_off,  column_index:  63, description: "MDS-UPDRS 3.6a OFF — pronation-supination: right hand", range: [0, 4]}
        - {column_name: mds_3_6_2_off,  column_index:  64, description: "MDS-UPDRS 3.6b OFF — pronation-supination: left hand", range: [0, 4]}
        - {column_name: mds_3_7_1_off,  column_index:  65, description: "MDS-UPDRS 3.7a OFF — toe tapping: right foot", range: [0, 4]}
        - {column_name: mds_3_7_2_off,  column_index:  66, description: "MDS-UPDRS 3.7b OFF — toe tapping: left foot", range: [0, 4]}
        - {column_name: mds_3_8_1_off,  column_index:  67, description: "MDS-UPDRS 3.8a OFF — leg agility: right leg", range: [0, 4]}
        - {column_name: mds_3_8_2_off,  column_index:  68, description: "MDS-UPDRS 3.8b OFF — leg agility: left leg", range: [0, 4]}
        - {column_name: mds_3_9_off,    column_index:  69, description: "MDS-UPDRS 3.9  OFF — arising from chair", range: [0, 4]}
        - {column_name: mds_3_10_off,   column_index:  70, description: "MDS-UPDRS 3.10 OFF — gait", range: [0, 4]}
        - {column_name: mds_3_11_off,   column_index:  71, description: "MDS-UPDRS 3.11 OFF — freezing of gait", range: [0, 4]}
        - {column_name: mds_3_12_off,   column_index:  72, description: "MDS-UPDRS 3.12 OFF — postural stability (pull test)", range: [0, 4]}
        - {column_name: mds_3_13_off,   column_index:  73, description: "MDS-UPDRS 3.13 OFF — posture", range: [0, 4]}
        - {column_name: mds_3_14_off,   column_index:  74, description: "MDS-UPDRS 3.14 OFF — global spontaneity of movement (body bradykinesia)", range: [0, 4]}
        - {column_name: mds_3_15_1_off, column_index:  75, description: "MDS-UPDRS 3.15a OFF — postural tremor: right hand", range: [0, 4]}
        - {column_name: mds_3_15_2_off, column_index:  76, description: "MDS-UPDRS 3.15b OFF — postural tremor: left hand", range: [0, 4]}
        - {column_name: mds_3_16_1_off, column_index:  77, description: "MDS-UPDRS 3.16a OFF — kinetic tremor: right hand", range: [0, 4]}
        - {column_name: mds_3_16_2_off, column_index:  78, description: "MDS-UPDRS 3.16b OFF — kinetic tremor: left hand", range: [0, 4]}
        - {column_name: mds_3_17_1_off, column_index:  79, description: "MDS-UPDRS 3.17a OFF — rest tremor amplitude: right upper extremity (RUE)", range: [0, 4]}
        - {column_name: mds_3_17_2_off, column_index:  80, description: "MDS-UPDRS 3.17b OFF — rest tremor amplitude: left upper extremity (LUE)", range: [0, 4]}
        - {column_name: mds_3_17_3_off, column_index:  81, description: "MDS-UPDRS 3.17c OFF — rest tremor amplitude: right lower extremity (RLE)", range: [0, 4]}
        - {column_name: mds_3_17_4_off, column_index:  82, description: "MDS-UPDRS 3.17d OFF — rest tremor amplitude: left lower extremity (LLE)", range: [0, 4]}
        - {column_name: mds_3_17_5_off, column_index:  83, description: "MDS-UPDRS 3.17e OFF — rest tremor amplitude: lip/jaw", range: [0, 4]}
        - {column_name: mds_3_18_off,   column_index:  84, description: "MDS-UPDRS 3.18 OFF — constancy of rest tremor", range: [0, 4]}
        # Part 3 OFF computed subscores
        - {column_name: mds_3a_off,     column_index:  48, description: "MDS-UPDRS Part 3 OFF — rest tremor subscore (sum of 3.17 items)", range: [0, null]}
        - {column_name: mds_3b_off,     column_index:  49, description: "MDS-UPDRS Part 3 OFF — action/postural tremor subscore (3.15+3.16)", range: [0, null]}
        - {column_name: mds_3c_off,     column_index:  50, description: "MDS-UPDRS Part 3 OFF — rigidity subscore (sum of 3.3 items)", range: [0, null]}
        - {column_name: mds_3c_1_off,   column_index:  51, description: "MDS-UPDRS Part 3 OFF — neck rigidity (item 3.3a subscore)", range: [0, null]}
        - {column_name: mds_3a_dysk_off,column_index:  85, description: "MDS-UPDRS 3 OFF — dyskinesias present during examination (binary)", range: [0, 1]}
        - {column_name: mds_3b_dysk_off,column_index:  86, description: "MDS-UPDRS 3 OFF — dyskinesias interfered with rating (binary)", range: [0, 1]}
        # ── Part 3: Motor examination — ON state ──
        - {column_name: mds_3_1_on,    column_index: 234, description: "MDS-UPDRS 3.1  ON — speech", range: [0, 4]}
        - {column_name: mds_3_2_on,    column_index: 235, description: "MDS-UPDRS 3.2  ON — facial expression", range: [0, 4]}
