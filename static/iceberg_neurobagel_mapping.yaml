        - {column_name: nmss_4,  column_index:  61, description: "NMSS item 4  — nausea or vomiting",                                                   range: [0, 1]}
        - {column_name: nmss_5,  column_index:  62, description: "NMSS item 5  — constipation (fewer than 3 stools/week) or impaction",                 range: [0, 1]}
        - {column_name: nmss_6,  column_index:  63, description: "NMSS item 6  — fecal incontinence (not knowing stools are passing)",                  range: [0, 1]}
        - {column_name: nmss_7,  column_index:  64, description: "NMSS item 7  — feeling bladder does not empty completely after urination",             range: [0, 1]}
        - {column_name: nmss_8,  column_index:  65, description: "NMSS item 8  — urinary urgency (difficulty controlling urination)",                    range: [0, 1]}
        - {column_name: nmss_9,  column_index:  66, description: "NMSS item 9  — getting up regularly at night to urinate",                             range: [0, 1]}
