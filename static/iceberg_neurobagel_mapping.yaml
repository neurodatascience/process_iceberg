        - {column_name: nmss_11, column_index:  68, description: "NMSS item 11 — unexplained weight change (not due to diet)",                          range: [0, 1]}
        - {column_name: nmss_12, column_index:  69, description: "NMSS item 12 — problems remembering recent events or forgetting tasks",               range: [0, 1]}
        - {column_name: nmss_13, column_index:  70, description: "NMSS item 13 — loss of interest in surroundings or doing things (apathy)",            range: [0, 1]}
        - {column_name: nmss_14, column_index:  71, description: "NMSS item 14 — seeing things or people not actually present (visual hallucinations)",  range: [0, 1]}
        - {column_name: nmss_15, column_index:  72, description: "NMSS item 15 — difficulty concentrating or staying attentive",                        range: [0, 1]}
        - {column_name: nmss_16, column_index:  73, description: "NMSS item 16 — feeling sad, down, or melancholic",                                    range: [0, 1]}
