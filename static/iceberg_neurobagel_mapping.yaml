    # ── UPSIT ─────────────────────────────────────────────────────────────────
    upsit:
      assessment_name: "University of Pennsylvania Smell Identification Test (UPSIT)"
      neurobagel_term: "nb:Assessment"
      assessment_term_url: "TBD — needs SNOMED or NLX term lookup for UPSIT"
      sheet: Non motrice
      note: >
        Subscale item-level data is not available; only the total score and
        an olfactory diagnosis category are stored. The UPSIT total score
        is the count of correctly identified odours out of 40.
      admin_flags:
        - column_name: upsit_done
          column_index: 90
          description: "UPSIT administered at this visit (1=Yes, 0=No)"
      columns:
        - column_name: upsit_sc
          column_index: 93
          description: "UPSIT total score — number of correctly identified odours (40-item scratch-and-sniff test)"
          variable_type: Continuous
          range: [0, 40]
        - column_name: diag_olf
          column_index: 94
          description: "Olfactory diagnosis category derived from UPSIT score"
          variable_type: Categorical
          levels:
            "1": "Normosmia (normal smell)"
            "2": "Mild microsmia"
            "3": "Moderate microsmia"
            "4": "Severe microsmia"
            "5": "Anosmia (absent smell)"
            "6": "Probable malingering"
          missing_values: ["", NaN]
      missing_values: ["", NaN]

# ─────────────────────────────────────────────────────────────────────────────
# NEUROIMAGING MODALITY FLAGS
# ─────────────────────────────────────────────────────────────────────────────
# These columns are NOT annotatable via the Neurobagel phenotypic annotation
# tool, but must be exported in the TSV to enable construction of a
# Neurobagel imaging table (format: sub, ses, suffix, path).
# Reference: https://neurobagel.org/user_guide/preparing_imaging_data/
# Supported Neurobagel modality namespace: nidm: (http://purl.org/nidash/nidm#)
imaging_modality_flags:
  sheet: Imagerie
  note: >
    All flags are binary (1=Yes, 0=No).
    DaTScan is a SPECT acquisition — SPECT is NOT in the Neurobagel supported
    modality vocabulary (only PET is listed); the flag is exported for
    completeness. irm_r2 and irm_melan have no direct Neurobagel modality
    match and are exported as informational flags.
  columns:
    - column_name: irm_fait
      column_index: 8
      description: "MRI performed at this visit (umbrella flag — 1=any MRI acquired)"
      neurobagel_modality: null
      missing_values: ["", NaN]

    - column_name: irm_3dt1
      column_index: 20
      description: "3D T1-weighted MRI acquired (labeled '3DT1' in Dictionnaire)"
      neurobagel_modality: "nidm:T1Weighted"
      missing_values: ["", NaN]

    - column_name: irm_3dt2
      column_index: 21
      description: "3D FLAIR MRI acquired (T2-FLAIR; labeled '3DFLAIR' in Dictionnaire — maps to T2-weighted class)"
      neurobagel_modality: "nidm:T2Weighted"
      missing_values: ["", NaN]

    - column_name: irm_tdif
      column_index: 22
      description: "Diffusion tensor imaging (DTI) acquired"
      neurobagel_modality: "nidm:DiffusionWeighted"
      missing_values: ["", NaN]

    - column_name: irm_r2
      column_index: 23
      description: "R2*/T2* quantitative susceptibility mapping acquired"
      neurobagel_modality: null
      note: "No direct Neurobagel modality match for quantitative T2* mapping"
      missing_values: ["", NaN]

    - column_name: irm_rs
      column_index: 24
      description: "Resting-state fMRI (BOLD) acquired"
      neurobagel_modality: "nidm:FlowWeighted"
      missing_values: ["", NaN]

    - column_name: irm_melan
      column_index: 25
      description: "Neuromelanin-sensitive MRI acquired (specialized T1-like sequence)"
      neurobagel_modality: null
      note: "No direct Neurobagel modality match; closest is T1Weighted but this is a specialized sequence"
      missing_values: ["", NaN]

    - column_name: datsc_real
      column_index: 34
      description: "DaTScan SPECT performed at this visit"
      neurobagel_modality: null
      note: "SPECT is NOT in Neurobagel's supported modality vocabulary (only PET is listed); export as informational flag"
      missing_values: ["", NaN]
