    # ── NMSS ──────────────────────────────────────────────────────────────────
    nmss:
      assessment_name: "Non-Motor Symptoms Scale — Screening Version (NMSS)"
      neurobagel_term: "nb:Assessment"
      assessment_term_url: "TBD — needs SNOMED or NLX term lookup for NMSS"
      sheet: Non motrice
      note: >
        IMPORTANT: The NMSS items in this dataset are binary (0=No, 1=Yes),
        not the standard frequency × severity scoring (which gives a 0–12 range
        per item). This is a simplified presence/absence screening version.
        The total score (calc_sc_nmss) is therefore a simple count of positive
        items (range 0–30), not the standard 0–360 weighted total.
      admin_flags:
        - column_name: examen_realise_nmss
          column_index: 56
          description: "NMSS administered at this visit (1=Yes, 0=No)"
      columns:
        - {column_name: nmss_1,  column_index:  58, description: "NMSS item 1  — daytime drooling of saliva",                                          range: [0, 1]}
        - {column_name: nmss_2,  column_index:  59, description: "NMSS item 2  — loss or change in sense of smell or taste",                            range: [0, 1]}
